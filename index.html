    <script>
        async function compressAllImages() {
        const options = {
            maxSizeMB: 1.3,
            maxWidthOrHeight: 1280,
            useWebWorker: true
        };

        const images = document.querySelectorAll('img');
        for (let img of images) {
            try {
            const response = await fetch(img.src);
            const blob = await response.blob();
            const compressedFile = await imageCompression(blob, options);
            img.src = URL.createObjectURL(compressedFile);
            } catch (e) {
            console.warn("Skipping img compression for:", img.src);
            }
        }

        const bgElements = document.querySelectorAll('.strip-bg');
        for (let el of bgElements) {
            try {
            let style = window.getComputedStyle(el).backgroundImage;
            let bgUrl = style.slice(4, -1).replace(/"/g, "");
            
            if (bgUrl && bgUrl !== 'none') {
                const response = await fetch(bgUrl);
                const blob = await response.blob();
                const compressedFile = await imageCompression(blob, options);
                const newUrl = URL.createObjectURL(compressedFile);
                
                el.style.backgroundImage = `url(${newUrl})`;
                el.style.opacity = "1";
            }
            } catch (e) {
            console.warn("Skipping BG compression for:", el);
            }
        }
        }

        window.onload = compressAllImages;
        </script>
